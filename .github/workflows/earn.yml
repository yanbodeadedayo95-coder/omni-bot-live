name: Earn & Withdraw

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3 
    steps:
      - name: Generate Temp Email
        run: |
          EMAIL=$(curl -s https://api.mail.tm/accounts | jq -r '.["hydra:member"][0].address')
          echo "EMAIL=$EMAIL" >> $GITHUB_ENV
          echo "Generated email: $EMAIL"

      - name: Test API Call (Fake Registration)
        run: |
          echo "Simulating registration for ${{ env.EMAIL }}"
          sleep 2
          echo "Registration successful (simulated)"

      - name: Simulate Ad Clicks
        run: |
          for i in {1..3}; do
            echo "Clicking ad #$i"
            sleep 1
          done

      - name: Send Test Payment to Your Wallet
        run: |
          curl -X POST https://api.nowpayments.io/v1/payment \
            -H "x-api-key: ${{ secrets.NOWPAYMENTS_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "amount": 1.00,
              "currency": "USDT",
              "address": "${{ secrets.WALLET_ADDRESS }}"
            }' || echo "Payment request sent (check logs)"

      - name: Save Balance to JSON
        run: |
          echo '{"test_site": 1.00, "updated": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' > balance.json

      - name: Commit and Push Balance
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add balance.json
          git commit -m "Update test balance" || echo "No changes"
          git push
